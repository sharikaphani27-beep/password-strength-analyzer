<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Password Analyzer</h1>
            <p class="subtitle">Check the strength of your password</p>
            
            <div class="input-group">
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="Enter your password"
                    autocomplete="off"
                >
                <button type="button" id="toggleBtn" class="toggle-btn">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg id="eyeOffIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.72a23 23 0 0 1 3.88-3.88"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
            </div>
            
            <button id="analyzeBtn" class="analyze-btn">Analyze Password</button>
            
            <div id="result" class="result hidden">
                <div class="strength-indicator">
                    <div class="strength-label">Strength</div>
                    <div id="strengthText" class="strength-value">-</div>
                </div>
                <div class="score-bar">
                    <div id="scoreFill" class="score-fill"></div>
                </div>
                <div id="scoreText" class="score-text">0/5</div>
                
                <div id="feedback" class="feedback">
                    <h3>Suggestions</h3>
                    <ul id="feedbackList"></ul>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
