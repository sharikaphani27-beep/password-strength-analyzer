<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Password Strength Analyzer</h1>
            <p class="subtitle">Check how strong your password is</p>
            
            <div class="input-group">
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="Enter your password"
                    autocomplete="off"
                >
                <button id="toggleVisibility" class="icon-btn" type="button">
                    <span id="eyeIcon">👁️</span>
                </button>
            </div>
            
            <button id="analyzeBtn" class="analyze-btn">Analyze Password</button>
            
            <div id="result" class="result hidden">
                <div class="strength-indicator">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <p id="strengthText" class="strength-text"></p>
                </div>
                
                <div class="score-display">
                    <span id="scoreText"></span>
                </div>
                
                <div class="checks-list">
                    <div class="check-item" data-check="length">
                        <span class="check-icon"></span>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="check-item" data-check="uppercase">
                        <span class="check-icon"></span>
                        <span>Contains uppercase letter</span>
                    </div>
                    <div class="check-item" data-check="lowercase">
                        <span class="check-icon"></span>
                        <span>Contains lowercase letter</span>
                    </div>
                    <div class="check-item" data-check="digit">
                        <span class="check-icon"></span>
                        <span>Contains a number</span>
                    </div>
                    <div class="check-item" data-check="special">
                        <span class="check-icon"></span>
                        <span>Contains special character</span>
                    </div>
                </div>
                
                <div id="feedback" class="feedback hidden"></div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
